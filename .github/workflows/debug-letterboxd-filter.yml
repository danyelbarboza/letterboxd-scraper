name: Debug Letterboxd filtered page

on:
  push:
    branches:
      - data/top-10-by-country-2026-07-19
    paths:
      - scripts/debug_letterboxd_filter.py
      - .github/workflows/debug-letterboxd-filter.yml

permissions:
  contents: read

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install -e .
      - run: python scripts/debug_letterboxd_filter.py
      - uses: actions/upload-artifact@v4
        with:
          name: letterboxd-filter-debug
          path: output/filter-debug/
          if-no-files-found: error
          retention-days: 1
