name: Autoformat agent branch

on:
  push:
    branches:
      - agent/upgrade-country-workflow

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/upgrade-country-workflow
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Ruff
        run: python -m pip install 'ruff>=0.6,<1'
      - name: Apply canonical formatting
        run: ruff format src tests
      - name: Commit formatting changes
        run: |
          if git diff --quiet -- src tests; then
            echo 'No formatting changes required.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src tests
          git commit -m 'Apply canonical Ruff formatting'
          git push origin HEAD:agent/upgrade-country-workflow
