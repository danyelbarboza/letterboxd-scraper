name: Debug filtered Letterboxd pages

on:
  pull_request:
    branches:
      - main
    paths:
      - scripts/debug_filtered_pages.py
      - .github/workflows/debug-filtered-pages.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install requests
      - run: python scripts/debug_filtered_pages.py
      - uses: actions/upload-artifact@v4
        with:
          name: filtered-page-debug
          path: output/debug-filtered-pages/
          retention-days: 1
