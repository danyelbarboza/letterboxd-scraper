name: Publish Python package

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      package-version: ${{ steps.package-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: python -m pip install --upgrade pip build twine
      - name: Read package version
        id: package-version
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib

          with open("pyproject.toml", "rb") as handle:
              version = tomllib.load(handle)["project"]["version"]
          print(f"version={version}")
          PY
      - name: Verify release tag matches package version
        if: github.event_name == 'release'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          python - <<'PY'
          import os
          import tomllib

          with open("pyproject.toml", "rb") as handle:
              version = tomllib.load(handle)["project"]["version"]
          tag = os.environ["RELEASE_TAG"].removeprefix("v")
          if tag != version:
              raise SystemExit(f"Release tag {tag!r} does not match package version {version!r}")
          PY
      - name: Build distributions
        run: python -m build
      - name: Check distribution metadata
        run: twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/letterboxd-list-toolkit
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist/
      - name: Check whether this version already exists on PyPI
        id: pypi-version
        env:
          PACKAGE_NAME: letterboxd-list-toolkit
          PACKAGE_VERSION: ${{ needs.build.outputs.package-version }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import os
          import urllib.error
          import urllib.request

          name = os.environ["PACKAGE_NAME"]
          version = os.environ["PACKAGE_VERSION"]
          url = f"https://pypi.org/pypi/{name}/{version}/json"
          try:
              with urllib.request.urlopen(url, timeout=30) as response:
                  exists = response.status == 200
          except urllib.error.HTTPError as exc:
              if exc.code != 404:
                  raise
              exists = False
          print(f"exists={'true' if exists else 'false'}")
          PY
      - name: Publish distributions to PyPI
        if: steps.pypi-version.outputs.exists != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
      - name: Report existing version
        if: steps.pypi-version.outputs.exists == 'true'
        run: echo "Version ${{ needs.build.outputs.package-version }} is already published; skipping upload."
