name: Generate 2026 non-US over-10k CSV

on:
  pull_request:
    paths:
      - 'scripts/generate_2026_non_us_over10k.py'
      - '.github/workflows/generate-2026-non-us-over10k.yml'

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install project
        run: python -m pip install --upgrade pip && python -m pip install -e .
      - name: Optimize missing members-page checks
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('scripts/generate_2026_non_us_over10k.py')
          text = path.read_text(encoding='utf-8')

          text = re.sub(
              r'def validate_members_page_size\(http: HttpClient\) -> None:\n.*?\n\n\ndef watch_threshold_url',
              '''def fetch_jina_page_allow_404(http: HttpClient, url: str) -> str | None:
              target = f"https://r.jina.ai/{url}"
              response = http.get(target, allow_404=True)
              if response.status_code == 404:
                  return None
              if "Performing security verification" in response.text or "Just a moment..." in response.text:
                  raise RuntimeError(f"Jina returned a security verification page for {url}")
              return response.text


          def validate_members_page_size(http: HttpClient) -> None:
              url = urljoin(PAGE_SIZE_VALIDATION_FILM, "members/")
              markdown = fetch_jina_page_allow_404(http, url)
              if markdown is None:
                  raise RuntimeError(f"Could not load the page-size validation URL: {url}")
              count = member_rows(markdown)
              if count != MEMBERS_PER_PAGE:
                  raise RuntimeError(
                      f"Expected {MEMBERS_PER_PAGE} member rows on a full Letterboxd members page, "
                      f"but parsed {count} from {url}. Refusing to infer the 10k threshold."
                  )


          def watch_threshold_url''',
              text,
              flags=re.DOTALL,
          )

          text = re.sub(
              r'def check_over_10k\(http: HttpClient, ref: FilmRef\) -> tuple\[str, bool \| None, str\]:\n.*?\n\n\ndef main',
              '''def check_over_10k(http: HttpClient, ref: FilmRef) -> tuple[str, bool | None, str]:
              url = watch_threshold_url(ref)
              try:
                  markdown = fetch_jina_page_allow_404(http, url)
              except Exception as exc:
                  return ref.uri, None, repr(exc)
              if markdown is None:
                  return ref.uri, False, ""
              return ref.uri, member_rows(markdown) > 0, ""


          def main''',
              text,
              flags=re.DOTALL,
          )

          text = text.replace('max_attempts=4,', 'max_attempts=2,')
          path.write_text(text, encoding='utf-8')
          PY
      - name: Generate and validate CSVs
        shell: bash
        run: |
          mkdir -p output/2026-non-us-over10k-rating-above-3-4
          set -o pipefail
          python scripts/generate_2026_non_us_over10k.py 2>&1 | tee output/2026-non-us-over10k-rating-above-3-4/run.log
      - name: Upload requested CSVs and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: letterboxd-2026-non-us-over10k-rating-above-3-4
          path: output/2026-non-us-over10k-rating-above-3-4/
          if-no-files-found: error
          retention-days: 7
