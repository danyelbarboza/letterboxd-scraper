name: Generate 2026 non-US over-10k CSV

on:
  pull_request:
    paths:
      - 'scripts/generate_2026_non_us_live.py'
      - '.github/workflows/generate-2026-non-us-over10k.yml'

concurrency:
  group: generate-2026-non-us-over10k-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install project
        run: python -m pip install --upgrade pip && python -m pip install -e .
      - name: Generate and validate CSVs
        shell: bash
        run: |
          mkdir -p output/2026-non-us-over10k-rating-above-3-4
          set -o pipefail
          python scripts/generate_2026_non_us_live.py 2>&1 | tee output/2026-non-us-over10k-rating-above-3-4/run.log
      - name: Upload requested CSVs and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: letterboxd-2026-non-us-over10k-rating-above-3-4
          path: output/2026-non-us-over10k-rating-above-3-4/
          if-no-files-found: error
          retention-days: 7
