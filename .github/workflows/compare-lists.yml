name: Compare Letterboxd lists
on:
  pull_request:
    paths:
      - 'scripts/compare_lists.py'
      - '.github/workflows/compare-lists.yml'
jobs:
  compare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests beautifulsoup4
      - env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/danyelbarboza/letterboxd-list-toolkit/actions/artifacts/8445441641/zip > atlas.zip
          mkdir atlas
          unzip -q atlas.zip -d atlas
      - run: python scripts/compare_lists.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: list-overlap-result
          path: output/list_overlap.json
