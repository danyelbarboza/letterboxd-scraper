name: Diagnose public members endpoints

on:
  pull_request:
    paths:
      - '.github/workflows/diagnose-members-endpoints.yml'

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Test members endpoint variants
        run: |
          python -m pip install requests
          mkdir -p members-diagnostics
          python - <<'PY'
          import json
          from pathlib import Path
          import requests

          urls = {
              'embed_first': 'https://embed.letterboxd.com/film/project-hail-mary/members/',
              'embed_threshold': 'https://embed.letterboxd.com/film/project-hail-mary/members/page/401/',
              'embed_low_threshold': 'https://embed.letterboxd.com/film/backrooms-2026/members/page/401/',
              'standard_first': 'https://letterboxd.com/film/project-hail-mary/members/',
              'standard_threshold': 'https://letterboxd.com/film/project-hail-mary/members/page/401/',
          }
          headers = {'User-Agent': 'Mozilla/5.0', 'Accept-Language': 'en-US,en;q=0.9'}
          out = Path('members-diagnostics')
          summary = {}
          for name, url in urls.items():
              try:
                  response = requests.get(url, headers=headers, timeout=60, allow_redirects=True)
                  text = response.text
                  summary[name] = {
                      'url': url,
                      'status': response.status_code,
                      'final_url': response.url,
                      'length': len(text),
                      'activity_count': text.count('Activity for film'),
                      'film_link_count': text.count('/film/project-hail-mary/'),
                      'title': text[text.find('<title>'):text.find('</title>') + 8] if '<title>' in text else '',
                  }
                  (out / f'{name}.html').write_text(text, encoding='utf-8')
              except Exception as exc:
                  summary[name] = {'url': url, 'error': repr(exc)}
          (out / 'summary.json').write_text(json.dumps(summary, indent=2), encoding='utf-8')
          print(json.dumps(summary, indent=2))
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: letterboxd-members-endpoint-diagnostics
          path: members-diagnostics/
          if-no-files-found: error
          retention-days: 2
