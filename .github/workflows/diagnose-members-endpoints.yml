name: Probe official film statistics endpoints

on:
  pull_request:
    paths:
      - '.github/workflows/diagnose-members-endpoints.yml'

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Probe statistics endpoints
        run: |
          python -m pip install requests beautifulsoup4
          mkdir -p members-diagnostics
          python - <<'PY'
          from __future__ import annotations

          import json
          import re
          from pathlib import Path

          import requests
          from bs4 import BeautifulSoup

          out = Path('members-diagnostics')
          session = requests.Session()
          session.headers.update({
              'User-Agent': 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/150 Safari/537.36',
              'Accept': 'application/json,text/plain,*/*',
              'Accept-Language': 'en-US,en;q=0.9',
              'Referer': 'https://letterboxd.com/film/project-hail-mary/',
          })

          page = session.get('https://letterboxd.com/film/project-hail-mary/', timeout=60)
          page_text = page.text
          soup = BeautifulSoup(page_text, 'html.parser')
          csrf = ''
          csrf_node = soup.select_one('meta[name="csrf-token"], input[name="__csrf"]')
          if csrf_node:
              csrf = str(csrf_node.get('content') or csrf_node.get('value') or '')
          if not csrf:
              match = re.search(r'csrf(?:Token)?["\']?\s*[:=]\s*["\']([^"\']+)', page_text, re.I)
              csrf = match.group(1) if match else ''

          urls = {
              'same_origin_film_stats': 'https://letterboxd.com/api/v0/film/pEeQ/statistics',
              'api_host_film_stats': 'https://api.letterboxd.com/api/v0/film/pEeQ/statistics',
              'same_origin_global_stats': 'https://letterboxd.com/api/v0/statistics?film=pEeQ',
              'api_host_global_stats': 'https://api.letterboxd.com/api/v0/statistics?film=pEeQ',
              'same_origin_production': 'https://letterboxd.com/api/v0/production/pEeQ?type=Film',
              'api_host_production': 'https://api.letterboxd.com/api/v0/production/pEeQ?type=Film',
          }

          summary = {
              'page_status': page.status_code,
              'page_final_url': page.url,
              'cookies': session.cookies.get_dict(),
              'csrf_found': bool(csrf),
              'responses': {},
          }
          for name, url in urls.items():
              headers = {}
              if csrf:
                  headers['X-CSRF-TOKEN'] = csrf
              try:
                  response = session.get(url, headers=headers, timeout=60, allow_redirects=True)
                  body = response.text
                  try:
                      parsed = response.json()
                  except Exception:
                      parsed = None
                  summary['responses'][name] = {
                      'url': url,
                      'status': response.status_code,
                      'final_url': response.url,
                      'content_type': response.headers.get('content-type'),
                      'www_authenticate': response.headers.get('www-authenticate'),
                      'cf_mitigated': response.headers.get('cf-mitigated'),
                      'json': parsed,
                      'body_prefix': body[:2000],
                  }
                  (out / f'{name}.txt').write_text(body, encoding='utf-8')
              except Exception as exc:
                  summary['responses'][name] = {'url': url, 'error': repr(exc)}

          (out / 'summary.json').write_text(json.dumps(summary, ensure_ascii=False, indent=2), encoding='utf-8')
          print(json.dumps(summary, ensure_ascii=False, indent=2))
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: letterboxd-official-statistics-probe
          path: members-diagnostics/
          if-no-files-found: error
          retention-days: 2
