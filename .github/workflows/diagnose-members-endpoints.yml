name: Diagnose rating histogram watch counts

on:
  pull_request:
    paths:
      - '.github/workflows/diagnose-members-endpoints.yml'

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Probe histogram variants
        run: |
          python -m pip install requests beautifulsoup4
          mkdir -p members-diagnostics/raw
          python - <<'PY'
          from __future__ import annotations

          import json
          import re
          from pathlib import Path

          import requests
          from bs4 import BeautifulSoup

          out = Path('members-diagnostics')
          raw = out / 'raw'
          headers = {
              'User-Agent': 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/150 Safari/537.36',
              'Accept-Language': 'en-US,en;q=0.9',
          }
          slugs = ['project-hail-mary', 'barbie', 'backrooms-2026']
          summary = {}

          for slug in slugs:
              target = f'https://letterboxd.com/csi/film/{slug}/rating-histogram/'
              variants = {
                  'jina_csi': f'https://r.jina.ai/{target}',
                  'jina_csi_query': f'https://r.jina.ai/{target}?esiAllowUser=true',
                  'embed_csi': f'https://embed.letterboxd.com/csi/film/{slug}/rating-histogram/',
                  'direct_csi': target,
              }
              slug_summary = {}
              for name, url in variants.items():
                  try:
                      response = requests.get(
                          url,
                          headers={
                              **headers,
                              'Referer': f'https://letterboxd.com/film/{slug}/',
                          },
                          timeout=90,
                          allow_redirects=True,
                      )
                      body = response.text
                      soup = BeautifulSoup(body, 'html.parser')
                      tooltip_values = [
                          str(node.get('data-original-title') or node.get('title') or '')
                          for node in soup.select('[data-original-title], [title]')
                          if 'Watched by' in str(node.get('data-original-title') or node.get('title') or '')
                      ]
                      regex_matches = re.findall(
                          r'Watched by\s+([0-9][0-9,\.\s\u00a0]*)\s+members?',
                          body,
                          flags=re.I,
                      )
                      slug_summary[name] = {
                          'url': url,
                          'status': response.status_code,
                          'final_url': response.url,
                          'content_type': response.headers.get('content-type', ''),
                          'length': len(body),
                          'tooltips': tooltip_values,
                          'regex_matches': regex_matches,
                          'contains_watched_by': 'Watched by' in body,
                          'body_prefix': body[:1500],
                      }
                      (raw / f'{slug}_{name}.txt').write_text(body, encoding='utf-8')
                  except Exception as exc:
                      slug_summary[name] = {'url': url, 'error': repr(exc)}
              summary[slug] = slug_summary

          (out / 'summary.json').write_text(
              json.dumps(summary, ensure_ascii=False, indent=2),
              encoding='utf-8',
          )
          print(json.dumps(summary, ensure_ascii=False, indent=2))
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: letterboxd-rating-histogram-diagnostics
          path: members-diagnostics/
          if-no-files-found: error
          retention-days: 2
