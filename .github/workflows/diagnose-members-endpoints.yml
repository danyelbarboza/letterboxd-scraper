name: Trace poster metadata endpoint

on:
  pull_request:
    paths:
      - '.github/workflows/diagnose-members-endpoints.yml'

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Fetch and inspect Letterboxd bundles
        run: |
          python -m pip install requests beautifulsoup4
          mkdir -p members-diagnostics/scripts
          python - <<'PY'
          from __future__ import annotations

          import json
          import re
          from pathlib import Path
          from urllib.parse import urljoin

          import requests
          from bs4 import BeautifulSoup

          page_url = 'https://letterboxd.com/film/project-hail-mary/'
          headers = {
              'User-Agent': 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/150 Safari/537.36',
              'Accept-Language': 'en-US,en;q=0.9',
          }
          session = requests.Session()
          session.headers.update(headers)
          page = session.get(page_url, timeout=60)
          soup = BeautifulSoup(page.text, 'html.parser')
          script_urls = [
              urljoin(page_url, str(node.get('src')))
              for node in soup.select('script[src]')
              if 's.ltrbxd.com/static/js/' in str(node.get('src'))
          ]

          out = Path('members-diagnostics')
          scripts_dir = out / 'scripts'
          needles = [
              'Watched by',
              'icon-watched',
              'request-poster-metadata',
              'requestPosterMetadata',
              'details-endpoint',
              'detailsEndpoint',
              'posterMetadata',
              'poster-metadata',
              'data-original-title',
              'originalTitle',
              'filmStats',
              'watchCount',
              'watch-count',
              'members',
              '/json/',
              '/ajax/',
          ]
          summary = {'page_status': page.status_code, 'scripts': {}}

          for index, url in enumerate(script_urls):
              try:
                  response = session.get(url, timeout=90)
                  text = response.text
                  filename = f'{index:02d}_{url.rsplit("/", 1)[-1]}'
                  (scripts_dir / filename).write_text(text, encoding='utf-8')

                  matches = {}
                  for needle in needles:
                      contexts = []
                      for match in list(re.finditer(re.escape(needle), text, flags=re.I))[:30]:
                          contexts.append(
                              text[max(0, match.start() - 700):match.start() + 1400]
                          )
                      if contexts:
                          matches[needle] = contexts

                  urls_found = sorted(set(re.findall(
                      r'["\'`]([^"\'`]*(?:ajax|json|metadata|stat|member|watch)[^"\'`]*)["\'`]',
                      text,
                      flags=re.I,
                  )))
                  summary['scripts'][filename] = {
                      'url': url,
                      'status': response.status_code,
                      'length': len(text),
                      'matches': matches,
                      'candidate_strings': urls_found[:500],
                  }
              except Exception as exc:
                  summary['scripts'][url] = {'error': repr(exc)}

          (out / 'summary.json').write_text(
              json.dumps(summary, ensure_ascii=False, indent=2),
              encoding='utf-8',
          )
          print(json.dumps(summary, ensure_ascii=False, indent=2))
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: letterboxd-poster-endpoint-trace
          path: members-diagnostics/
          if-no-files-found: error
          retention-days: 2
