name: Probe statistics endpoints through public readers

on:
  pull_request:
    paths:
      - '.github/workflows/diagnose-members-endpoints.yml'

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Probe statistics endpoints
        run: |
          python -m pip install requests
          mkdir -p members-diagnostics
          python - <<'PY'
          from __future__ import annotations

          import json
          from pathlib import Path

          import requests

          out = Path('members-diagnostics')
          session = requests.Session()
          session.headers.update({
              'User-Agent': 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/150 Safari/537.36',
              'Accept': 'application/json,text/plain,*/*',
              'Accept-Language': 'en-US,en;q=0.9',
          })

          urls = {
              'jina_same_origin_stats': 'https://r.jina.ai/https://letterboxd.com/api/v0/film/pEeQ/statistics',
              'jina_api_host_stats': 'https://r.jina.ai/https://api.letterboxd.com/api/v0/film/pEeQ/statistics',
              'jina_same_origin_production': 'https://r.jina.ai/https://letterboxd.com/api/v0/production/pEeQ?type=Film',
              'jina_api_host_production': 'https://r.jina.ai/https://api.letterboxd.com/api/v0/production/pEeQ?type=Film',
              'jina_json_metadata': 'https://r.jina.ai/https://letterboxd.com/film/project-hail-mary/json/',
              'r_jina_http_stats': 'https://r.jina.ai/http://letterboxd.com/api/v0/film/pEeQ/statistics',
              'r_jina_http_api_stats': 'https://r.jina.ai/http://api.letterboxd.com/api/v0/film/pEeQ/statistics',
          }

          summary = {'responses': {}}
          for name, url in urls.items():
              try:
                  response = session.get(url, timeout=90, allow_redirects=True)
                  body = response.text
                  parsed = None
                  for candidate in (body, body.split('Markdown Content:', 1)[-1].strip()):
                      try:
                          parsed = json.loads(candidate)
                          break
                      except Exception:
                          pass
                  summary['responses'][name] = {
                      'url': url,
                      'status': response.status_code,
                      'final_url': response.url,
                      'content_type': response.headers.get('content-type'),
                      'json': parsed,
                      'body_prefix': body[:4000],
                  }
                  (out / f'{name}.txt').write_text(body, encoding='utf-8')
              except Exception as exc:
                  summary['responses'][name] = {'url': url, 'error': repr(exc)}

          (out / 'summary.json').write_text(
              json.dumps(summary, ensure_ascii=False, indent=2),
              encoding='utf-8',
          )
          print(json.dumps(summary, ensure_ascii=False, indent=2))
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: letterboxd-reader-statistics-probe
          path: members-diagnostics/
          if-no-files-found: error
          retention-days: 2
