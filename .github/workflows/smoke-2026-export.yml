name: Smoke test 2026 live export

on:
  pull_request:
    paths:
      - 'scripts/generate_2026_non_us_live.py'
      - '.github/workflows/smoke-2026-export.yml'

concurrency:
  group: smoke-2026-export-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      MIN_CATALOG_PAGES: '2'
      MAX_CATALOG_PAGES: '2'
      ZERO_PASS_PAGES_TO_STOP: '2'
      MAX_USA_CATALOG_PAGES: '10'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install project
        run: python -m pip install --upgrade pip && python -m pip install -e .
      - name: Run smoke export
        shell: bash
        run: |
          mkdir -p output/2026-non-us-over10k-rating-above-3-4
          set -o pipefail
          python scripts/generate_2026_non_us_live.py 2>&1 | tee output/2026-non-us-over10k-rating-above-3-4/smoke.log
      - name: Upload smoke output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: letterboxd-2026-export-smoke
          path: output/2026-non-us-over10k-rating-above-3-4/
          if-no-files-found: error
          retention-days: 2
